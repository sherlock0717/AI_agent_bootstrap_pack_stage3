services:
  n8n:
    type: docker_container
    container_name: n8n
    volume_name: n8n_data
    url: http://localhost:5678
    runtime_start_script: D:\AI_Hub\scripts\start_n8n.ps1
    repo_entry_script: scripts/start_hub.ps1

  obsidian:
    type: desktop_app
    vault_path: D:\AI_Hub\obsidian_vault
    notes_root: D:\AI_Hub\obsidian_vault\AI_Hub_Knowledge

  playwright_mcp:
    type: agent_tool
    browser: msedge
    logs: D:\AI_Hub\logs\playwright

  voice:
    type: local_python_environment
    root: D:\AI_Hub\voice
    venv: D:\AI_Hub\voice\.venv
    runtime_open_script: D:\AI_Hub\scripts\open_voice_env.ps1